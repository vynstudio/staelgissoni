[build]
functions = "netlify/functions"

# ── Security headers ──────────────────────────────────────────
[[headers]]
for = "/*"
  [headers.values]
  X-Content-Type-Options = "nosniff"
  X-Frame-Options = "DENY"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Permissions-Policy = "camera=(), microphone=(), geolocation=()"
  Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

[[headers]]
for = "/lang.js"
  [headers.values]
  Cache-Control = "no-cache, must-revalidate"

[[headers]]
for = "/*.html"
  [headers.values]
  Cache-Control = "no-cache, must-revalidate"

# ── Canonical domain redirects ────────────────────────────────
# staelgissoni.com is canonical. Legacy + Netlify subdomain all 301.
[[redirects]]
from = "https://staelfogarty.com/*"
to = "https://staelgissoni.com/:splat"
status = 301
force = true

[[redirects]]
from = "https://www.staelfogarty.com/*"
to = "https://staelgissoni.com/:splat"
status = 301
force = true

[[redirects]]
from = "https://www.staelgissoni.com/*"
to = "https://staelgissoni.com/:splat"
status = 301
force = true

[[redirects]]
from = "https://stael-fogarty.netlify.app/*"
to = "https://staelgissoni.com/:splat"
status = 301
force = true
