[[notifications]]
event = "submission_created"
form = "stael-checklist"
type = "email"
address = "hello@vyn.studio"
subject = "✅ Stael Gissoni — Onboarding Checklist Submitted"

[build]
functions = "netlify/functions"

[[headers]]
for = "/*"

  [headers.values]
  X-Content-Type-Options = "nosniff"
  X-Frame-Options = "DENY"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Permissions-Policy = "camera=(), microphone=(), geolocation=()"
  Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

[[headers]]
for = "/lang.js"

  [headers.values]
  Cache-Control = "no-cache, must-revalidate"

[[headers]]
for = "/*.html"

  [headers.values]
  Cache-Control = "no-cache, must-revalidate"

# ── Shop ──────────────────────────────────────────────────────
# Download landing page should never be indexed — it's a
# transactional endpoint reached from the order email.
[[headers]]
for = "/download"
  [headers.values]
  X-Robots-Tag = "noindex, nofollow"

[[headers]]
for = "/download.html"
  [headers.values]
  X-Robots-Tag = "noindex, nofollow"

# Pretty URLs for shop
[[redirects]]
from = "/shop"
to = "/shop.html"
status = 200

[[redirects]]
from = "/shop/:slug"
to = "/product.html?slug=:slug"
status = 200

[[redirects]]
from = "/download"
to = "/download.html"
status = 200

# /enterprise → /enterprise.html (B2B rate card + inquiry form)
[[redirects]]
from = "/enterprise"
to = "/enterprise.html"
status = 200
