[build]
functions = "netlify/functions"

[functions]
node_bundler = "esbuild"

# ── Pretty URLs for subpages ──────────────────────────────────
[[redirects]]
from = "/services"
to = "/services.html"
status = 200

[[redirects]]
from = "/about"
to = "/about.html"
status = 200

[[redirects]]
from = "/enterprise"
to = "/enterprise.html"
status = 200

[[redirects]]
from = "/book"
to = "/book.html"
status = 200

[[redirects]]
from = "/confirmed"
to = "/confirmed.html"
status = 200

[[redirects]]
from = "/blog"
to = "/blog.html"
status = 200

[[redirects]]
from = "/privacy"
to = "/privacy.html"
status = 200

[[redirects]]
from = "/terms"
to = "/terms.html"
status = 200

[[redirects]]
from = "/staff/prices"
to = "/staff/prices.html"
status = 200

# ── Security headers ──────────────────────────────────────────
[[headers]]
for = "/*"
  [headers.values]
  X-Content-Type-Options = "nosniff"
  X-Frame-Options = "DENY"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Permissions-Policy = "camera=(), microphone=(), geolocation=()"
  Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

[[headers]]
for = "/lang.js"
  [headers.values]
  Cache-Control = "no-cache, must-revalidate"

[[headers]]
for = "/*.html"
  [headers.values]
  Cache-Control = "no-cache, must-revalidate"

# ── Canonical domain redirects ────────────────────────────────
# staelgissoni.com is canonical. Legacy + Netlify subdomain all 301.
[[redirects]]
from = "https://staelgissoni.com/*"
to = "https://staelgissoni.com/:splat"
status = 301
force = true

[[redirects]]
from = "https://www.staelgissoni.com/*"
to = "https://staelgissoni.com/:splat"
status = 301
force = true

[[redirects]]
from = "https://www.staelgissoni.com/*"
to = "https://staelgissoni.com/:splat"
status = 301
force = true

[[redirects]]
from = "https://stael-gissoni.netlify.app/*"
to = "https://staelgissoni.com/:splat"
status = 301
force = true
