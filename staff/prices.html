<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Update prices — Stael Gissoni</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#FFF2EB;color:#2A2A3A;padding:24px 16px 80px;-webkit-font-smoothing:antialiased}
    .wrap{max-width:560px;margin:0 auto}
    h1{font-family:'Fraunces',serif;font-weight:800;font-size:32px;letter-spacing:-1px;margin-bottom:8px;line-height:1.1}
    h1 .dot{color:#F2A07B}
    .lede{color:#5a5a6a;font-size:15px;line-height:1.5;margin-bottom:32px}
    .cat{font-family:'Fraunces',serif;font-weight:700;font-size:22px;color:#2A2A3A;margin:32px 0 12px;border-bottom:2px solid #F2A07B;padding-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:8px}
    .cat-name{flex:1}
    .svc{background:#fff;border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:0 2px 8px rgba(42,42,58,0.06);position:relative;transition:opacity .2s}
    .svc.removed{opacity:0.45;background:#f3e7df}
    .svc.removed input{text-decoration:line-through;color:#9a9aa8}
    .svc.added{border-left:3px solid #F2A07B}
    .svc-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
    .svc-name-input{flex:1;font-weight:600;font-size:15px;color:#2A2A3A;line-height:1.3;border:1.5px solid transparent;border-radius:6px;padding:6px 8px;margin:-6px -8px;background:transparent;font-family:'Inter',sans-serif;width:calc(100% + 16px)}
    .svc-name-input:focus{outline:none;border-color:#F2A07B;background:#FFF8F2}
    .svc-name-input.changed{border-color:#F2A07B;background:#FFF8F2}
    .icon-btn{flex-shrink:0;width:30px;height:30px;border:none;background:transparent;color:#9a9aa8;cursor:pointer;border-radius:6px;font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s}
    .icon-btn:hover{background:#FFE4E4;color:#B71C1C}
    .icon-btn.restore:hover{background:#E0F4E5;color:#1B5E20}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .field label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.6px;color:#7a7a8a;margin-bottom:5px}
    .field input{width:100%;padding:10px 12px;border:1.5px solid #e8d8cc;border-radius:8px;font-size:15px;font-family:'Inter',sans-serif;color:#2A2A3A;background:#fff;transition:border-color .15s}
    .field input:focus{outline:none;border-color:#F2A07B}
    .field input.changed{border-color:#F2A07B;background:#FFF8F2}
    .add-svc{width:100%;background:transparent;border:1.5px dashed #c9b8ac;color:#7a5a48;padding:12px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;margin-bottom:14px;transition:border-color .15s,color .15s,background .15s;font-family:'Inter',sans-serif}
    .add-svc:hover{border-color:#F2A07B;color:#2A2A3A;background:#FFF8F2}
    textarea{width:100%;min-height:90px;padding:14px;border:1.5px solid #e8d8cc;border-radius:10px;font-size:15px;font-family:'Inter',sans-serif;color:#2A2A3A;background:#fff;resize:vertical;line-height:1.5}
    textarea:focus{outline:none;border-color:#F2A07B}
    .submit{width:100%;background:#5B8EC9;color:#fff;border:none;padding:18px;border-radius:12px;font-size:17px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;margin-top:24px;transition:background .15s}
    .submit:hover{background:#4A78B0}
    .submit:disabled{opacity:0.5;cursor:wait}
    .status{margin-top:14px;padding:14px;border-radius:10px;font-size:14px;line-height:1.5}
    .status.ok{background:#E0F4E5;color:#1B5E20;border:1px solid #95D5A0}
    .status.err{background:#FFE4E4;color:#B71C1C;border:1px solid #F5A5A5}
    .gate{background:#fff;border-radius:14px;padding:32px;text-align:center;margin-top:40px}
    .gate h2{font-family:'Fraunces',serif;font-size:22px;margin-bottom:12px}
    .gate p{color:#7a7a8a;font-size:14px;line-height:1.5}
    .badge{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;padding:3px 8px;border-radius:99px;margin-left:8px;vertical-align:middle}
    .badge.new{background:#F2A07B;color:#fff}
    .badge.removed{background:#9a9aa8;color:#fff}
    @media (max-width:420px){
      .row{grid-template-columns:1fr}
    }
  </style>
</head>
<body>

<div class="wrap">
  <div id="gate" class="gate" style="display:none">
    <h2>Link missing or expired</h2>
    <p>Open the link Diler sent you. The address must end with <code>?k=...</code>.</p>
  </div>

  <div id="form-wrap" style="display:none">
    <h1>Update your prices<span class="dot">.</span></h1>
    <p class="lede">Edit prices, rename services, remove what's gone, or add anything new. When you hit Save, Diler gets it on Telegram and updates the website.</p>

    <form id="form">
      <div id="services"></div>

      <div class="cat" style="margin-top:36px">Anything else?</div>
      <div class="svc">
        <div class="svc-name" style="font-weight:600;font-size:15px;margin-bottom:10px">Notes for Diler</div>
        <textarea id="notes" placeholder="Optional. e.g. 'Add a new category for subtitling' or 'Conference rates went up because of demand.'"></textarea>
      </div>

      <button type="submit" class="submit" id="submit-btn">Save and send to Diler</button>
      <div id="status"></div>
    </form>
  </div>
</div>

<script>
const SERVICES = [
  { category: 'Interpretation', name: 'On-site interpretation', desc: 'Conferences, depositions, meetings, USCIS', price: '$125–$165', min: '2-hour minimum' },
  { category: 'Interpretation', name: 'Remote interpretation (VRI)', desc: 'Google Meet, Zoom, phone, or your platform', price: '$95–$125', min: '30-minute minimum' },
  { category: 'Interpretation', name: 'Medical interpretation', desc: 'Doctor visits, hospital stays, mental health', price: '$110–$135', min: '2-hour minimum' },
  { category: 'Interpretation', name: 'Legal interpretation', desc: 'Depositions, USCIS hearings, citizenship prep', price: '$150–$175', min: '2-hour · $550 half-day · $950 full-day' },
  { category: 'Interpretation', name: 'Conference interpretation', desc: 'Booth & RSI (Zoom / Interprefy)', price: '$1,400–$1,800', min: 'per day · half-day $900' },
  { category: 'Language coaching', name: 'Conversation EN/PT', desc: 'Conversation, pronunciation, accent', price: '$50', min: 'per hour · no minimum' },
  { category: 'Language coaching', name: 'USCIS interview prep', desc: 'Mock interviews, civics test, USCIS vocabulary', price: '$75', min: 'per hour · 1-hour minimum' },
  { category: 'Certified translation', name: 'Personal documents', desc: 'Birth, marriage, divorce, school records', price: 'from $35', min: 'per page · $95 project minimum' },
  { category: 'Certified translation', name: 'Legal documents', desc: 'Contracts, affidavits, deposition exhibits', price: '$0.22–$0.28', min: 'per word · $150 project minimum' },
  { category: 'Certified translation', name: 'Medical documents', desc: 'Clinical notes, labs, patient histories', price: '$0.24–$0.32', min: 'per word · $150 project minimum' },
];

const params = new URLSearchParams(location.search);
const TOKEN = params.get('k') || '';

let nextId = 0;

if (!TOKEN) {
  document.getElementById('gate').style.display = 'block';
} else {
  document.getElementById('form-wrap').style.display = 'block';
  renderServices();
}

function svcRowHTML(s, opts = {}) {
  const { isNew = false, origName = s.name, origPrice = s.price, origMin = s.min } = opts;
  const id = nextId++;
  return `
    <div class="svc ${isNew ? 'added' : ''}" data-id="${id}" data-orig-name="${escapeAttr(origName)}" data-orig-price="${escapeAttr(origPrice)}" data-orig-min="${escapeAttr(origMin)}" data-is-new="${isNew ? '1' : '0'}" data-category="${escapeAttr(s.category)}">
      <div class="svc-head">
        <input type="text" class="svc-name-input" data-field="name" value="${escapeAttr(s.name)}" placeholder="Service name">
        <button type="button" class="icon-btn" data-action="toggle-remove" title="${isNew ? 'Discard' : 'Remove'}">${isNew ? '✕' : '🗑'}</button>
      </div>
      <div class="row">
        <div class="field">
          <label>Price</label>
          <input type="text" data-field="price" value="${escapeAttr(s.price)}" placeholder="$0">
        </div>
        <div class="field">
          <label>Unit / minimum</label>
          <input type="text" data-field="min" value="${escapeAttr(s.min)}" placeholder="per hour">
        </div>
      </div>
    </div>`;
}

function escapeAttr(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

function renderServices() {
  const container = document.getElementById('services');
  let html = '';

  // Group by category
  const byCat = {};
  SERVICES.forEach(s => {
    if (!byCat[s.category]) byCat[s.category] = [];
    byCat[s.category].push(s);
  });

  Object.keys(byCat).forEach(cat => {
    html += `<div class="cat" data-cat="${escapeAttr(cat)}"><span class="cat-name">${cat}</span></div>`;
    html += `<div class="cat-services" data-cat-services="${escapeAttr(cat)}">`;
    byCat[cat].forEach(s => { html += svcRowHTML(s); });
    html += `</div>`;
    html += `<button type="button" class="add-svc" data-add-cat="${escapeAttr(cat)}">+ Add service to ${cat}</button>`;
  });

  container.innerHTML = html;
  attachListeners();
}

function attachListeners() {
  // Track changes on existing inputs
  document.querySelectorAll('.svc input').forEach(input => {
    const svc = input.closest('.svc');
    input.addEventListener('input', () => {
      const field = input.dataset.field;
      const orig = svc.dataset['orig' + field.charAt(0).toUpperCase() + field.slice(1)];
      input.classList.toggle('changed', input.value !== orig && svc.dataset.isNew === '0');
    });
  });

  // Remove / restore buttons
  document.querySelectorAll('[data-action="toggle-remove"]').forEach(btn => {
    btn.addEventListener('click', () => {
      const svc = btn.closest('.svc');
      if (svc.dataset.isNew === '1') {
        svc.remove();
        return;
      }
      const isRemoved = svc.classList.toggle('removed');
      btn.textContent = isRemoved ? '↺' : '🗑';
      btn.title = isRemoved ? 'Restore' : 'Remove';
      btn.classList.toggle('restore', isRemoved);
      svc.querySelectorAll('input').forEach(i => i.disabled = isRemoved);
    });
  });

  // Add service buttons
  document.querySelectorAll('[data-add-cat]').forEach(btn => {
    btn.addEventListener('click', () => {
      const cat = btn.dataset.addCat;
      const list = document.querySelector(`[data-cat-services="${cat.replace(/"/g, '\\"')}"]`);
      const tmp = document.createElement('div');
      tmp.innerHTML = svcRowHTML({ category: cat, name: '', price: '', min: '' }, { isNew: true });
      const newRow = tmp.firstElementChild;
      list.appendChild(newRow);
      attachRowListeners(newRow);
      newRow.querySelector('.svc-name-input').focus();
    });
  });
}

function attachRowListeners(svc) {
  svc.querySelectorAll('input').forEach(input => {
    input.addEventListener('input', () => {
      const field = input.dataset.field;
      const orig = svc.dataset['orig' + field.charAt(0).toUpperCase() + field.slice(1)];
      input.classList.toggle('changed', input.value !== orig && svc.dataset.isNew === '0');
    });
  });
  const btn = svc.querySelector('[data-action="toggle-remove"]');
  btn.addEventListener('click', () => {
    if (svc.dataset.isNew === '1') {
      svc.remove();
      return;
    }
    const isRemoved = svc.classList.toggle('removed');
    btn.textContent = isRemoved ? '↺' : '🗑';
    btn.classList.toggle('restore', isRemoved);
    svc.querySelectorAll('input').forEach(i => i.disabled = isRemoved);
  });
}

document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const status = document.getElementById('status');
  btn.disabled = true;
  btn.textContent = 'Sending...';
  status.className = '';
  status.textContent = '';

  const services = [];
  document.querySelectorAll('.svc[data-id]').forEach(svc => {
    const isNew = svc.dataset.isNew === '1';
    const isRemoved = svc.classList.contains('removed');
    const category = svc.dataset.category;
    const name = svc.querySelector('[data-field="name"]').value.trim();
    const price = svc.querySelector('[data-field="price"]').value.trim();
    const min = svc.querySelector('[data-field="min"]').value.trim();
    const origName = svc.dataset.origName;
    const origPrice = svc.dataset.origPrice;
    const origMin = svc.dataset.origMin;

    let status_;
    if (isNew) {
      if (!name && !price && !min) return; // skip empty new rows
      status_ = 'added';
    } else if (isRemoved) {
      status_ = 'removed';
    } else if (name !== origName || price !== origPrice || min !== origMin) {
      status_ = 'changed';
    } else {
      status_ = 'unchanged';
    }

    services.push({
      category, name, price, min,
      origName: isNew ? null : origName,
      status: status_,
    });
  });

  const body = {
    k: TOKEN,
    services,
    notes: document.getElementById('notes').value.trim(),
  };

  try {
    const r = await fetch('/.netlify/functions/prices-update', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const j = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(j.error || ('HTTP ' + r.status));
    status.className = 'status ok';
    status.textContent = 'Sent! Diler will review and update the website. You can close this page now.';
    btn.textContent = 'Sent ✓';
  } catch (err) {
    status.className = 'status err';
    status.textContent = 'Error: ' + (err.message || 'unknown') + '. Try again or text Diler.';
    btn.disabled = false;
    btn.textContent = 'Save and send to Diler';
  }
});
</script>
</body>
</html>
