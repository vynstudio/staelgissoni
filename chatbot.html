  <input type="text" name="name" />
  <input type="email" name="email" />
  <input type="text" name="service" />
</form>

<!-- 
  STAEL FOGARTI — CHATBOT WIDGET
  Drop this file into any page with: <script src="chatbot.js"></script>

<div id="sf-chatbot">
  <!-- Bubble -->
  <div id="sf-bubble" onclick="sfChat.toggle()">
    <svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    <div id="sf-bubble-ping"></div>
  </div>

  <!-- Chat Window -->
  <div id="sf-window" class="sf-hidden">
    <!-- Header -->
    <div id="sf-header">
      <div id="sf-header-info">
        <div id="sf-avatar">S</div>
        <div>
          <div id="sf-header-name">Stael</div>
          <div id="sf-header-status"><span id="sf-status-dot"></span> Online — typically replies instantly</div>
        </div>
      </div>
      <button id="sf-close" onclick="sfChat.toggle()" aria-label="Close chat">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4l10 10M14 4L4 14"/></svg>
      </button>

      <button id="sf-send" onclick="sfChat.sendUser()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4z"/></svg>

<style>
/* ═══════════════════════════════════════════
   CHATBOT VARIABLES
   ═══════════════════════════════════════════ */
#sf-chatbot {
  --sf-blue: #5B8EC9;
  --sf-blue-deep: #4A78B0;
  --sf-blue-wash: #EBF2FA;
  --sf-peach: #F2A07B;
  --sf-peach-wash: #FFF2EB;
  --sf-mint: #8FC5B5;
  --sf-mint-wash: #EFF9F5;
  --sf-lav: #B8A9D4;
  --sf-lav-wash: #F5F1FB;
  --sf-bg: #FEFBF6;
  --sf-white: #FFFFFF;
  --sf-dark: #2A2A3A;
  --sf-text: #3D3D50;
  --sf-text-muted: #7C7C96;
  --sf-border: #EDECF0;
  --sf-radius: 18px;

  font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
  position: fixed;

  right: 24px;

}

/* ═══════════════════════════════════════════
   BUBBLE
   ═══════════════════════════════════════════ */
#sf-bubble {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: var(--sf-blue);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  box-shadow: 0 8px 32px rgba(91,142,201,0.4);
  transition: all 0.3s;
  position: relative;
}
#sf-bubble:hover {
  transform: scale(1.08);
  box-shadow: 0 12px 40px rgba(91,142,201,0.5);
}

#sf-bubble-ping {
  position: absolute; top: -2px; right: -2px;
  width: 18px; height: 18px;
  background: var(--sf-peach);
  border-radius: 50%;
  border: 3px solid var(--sf-white);
  animation: sf-ping 2s ease-in-out infinite;
}

@keyframes sf-ping {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.2); }
}

/* ═══════════════════════════════════════════
   CHAT WINDOW
   ═══════════════════════════════════════════ */
#sf-window {
  position: absolute;
  bottom: 80px; right: 0;
  width: 390px;
  max-height: 580px;
  background: var(--sf-bg);
  border-radius: 24px;
  box-shadow: 0 24px 64px rgba(42,42,58,0.15);
  display: flex; flex-direction: column;
  overflow: hidden;
  animation: sf-slideUp 0.35s cubic-bezier(0.34,1.56,0.64,1);

}

#sf-window.sf-hidden {
  display: none;
}

@keyframes sf-slideUp {
  from { opacity: 0; transform: translateY(16px) scale(0.96); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* ═══════════════════════════════════════════
   HEADER
   ═══════════════════════════════════════════ */
#sf-header {
  padding: 18px 20px;
  background: var(--sf-white);
  border-bottom: 1px solid var(--sf-border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}

#sf-header-info { display: flex; align-items: center; gap: 12px; }

#sf-avatar {
  width: 42px; height: 42px; border-radius: 50%;

  color: var(--sf-white);

  font-weight: 800; font-size: 1.1rem;
}

#sf-header-name {
  font-weight: 800; font-size: 1rem;
  color: var(--sf-dark);
}
#sf-header-status {
  font-size: 0.75rem; color: var(--sf-text-muted);
  display: flex; align-items: center; gap: 5px;
}
#sf-status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #4ADE80;
  display: inline-block;
}

#sf-close {
  background: none; border: none; cursor: pointer;
  color: var(--sf-text-muted); padding: 4px;
  border-radius: 8px; transition: all 0.2s;
}
#sf-close:hover { background: var(--sf-blue-wash); color: var(--sf-dark); }

/* ═══════════════════════════════════════════
   MESSAGES
   ═══════════════════════════════════════════ */
#sf-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px 12px;
  display: flex; flex-direction: column; gap: 10px;
  scroll-behavior: smooth;
}

#sf-messages::-webkit-scrollbar { width: 4px; }
#sf-messages::-webkit-scrollbar-thumb { background: var(--sf-border); border-radius: 4px; }

.sf-msg {
  max-width: 82%;
  padding: 12px 16px;
  border-radius: 18px;
  font-size: 0.9rem;
  line-height: 1.55;
  animation: sf-fadeIn 0.3s ease;
  word-wrap: break-word;
}

@keyframes sf-fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.sf-bot {
  background: var(--sf-white);
  color: var(--sf-text);
  align-self: flex-start;
  border-bottom-left-radius: 6px;
  box-shadow: 0 2px 8px rgba(42,42,58,0.04);

}

.sf-user {
  background: var(--sf-blue);
  color: var(--sf-white);
  align-self: flex-end;
  border-bottom-right-radius: 6px;
}

.sf-typing {
  display: flex; gap: 5px; padding: 14px 18px;
  align-self: flex-start;
}
.sf-typing span {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--sf-text-muted);
  animation: sf-bounce 1.4s ease-in-out infinite;
}
.sf-typing span:nth-child(2) { animation-delay: 0.2s; }
.sf-typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes sf-bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
}

/* ═══════════════════════════════════════════
   QUICK REPLIES
   ═══════════════════════════════════════════ */
#sf-quick-replies {
  padding: 0 16px 8px;
  display: flex; flex-wrap: wrap; gap: 8px;
  flex-shrink: 0;
}

.sf-qr {

  border-radius: 100px;
  font-size: 0.84rem;

  transition: all 0.25s;
  border: 1.5px solid var(--sf-border);

  color: var(--sf-text);

}
.sf-qr:hover {
  border-color: var(--sf-blue);
  background: var(--sf-blue-wash);

}

.sf-qr-primary {
  background: var(--sf-blue);
  color: var(--sf-white);
  border-color: var(--sf-blue);
}
.sf-qr-primary:hover {
  background: var(--sf-blue-deep);
  border-color: var(--sf-blue-deep);
  color: var(--sf-white);
}

/* ═══════════════════════════════════════════
   INPUT
   ═══════════════════════════════════════════ */
#sf-input-area {
  padding: 12px 16px 16px;
  display: flex; gap: 8px;
  background: var(--sf-white);
  border-top: 1px solid var(--sf-border);

}

#sf-input {

  padding: 11px 16px;

/* ═══════════════════════════════════════════
   DATE/TIME PICKER INSIDE CHAT
   ═══════════════════════════════════════════ */

/* Confirmation card */
.sf-confirm-card {

/* ═══════════════════════════════════════════
   MOBILE RESPONSIVE

@media (max-width: 480px) {

</style>

<script>
const sfChat = (() => {
  let state = {
    open: false,
    step: 'init',
    lead: { service: null, name: null, email: null }
  };

  const services = [
    { id: 'live',     label: '🎙️ Live Interpretation',    short: 'Live Interpretation',    price: 65,  unit: 'hr' },
    { id: 'virtual',  label: '💻 Virtual Session',         short: 'Virtual Session',         price: 55,  unit: 'hr' },
    { id: 'medical',  label: '🏥 Medical Interpretation',  short: 'Medical Interpretation',  price: 75,  unit: 'hr' },
    { id: 'legal',    label: '⚖️ Legal Interpretation',    short: 'Legal Interpretation',    price: 85,  unit: 'hr' },
    { id: 'coaching', label: '📚 Language Coaching',       short: 'Language Coaching',       price: 50,  unit: 'session' },
  ];

  const els = () => ({
    window:   document.getElementById('sf-window'),
    bubble:   document.getElementById('sf-bubble'),
    messages: document.getElementById('sf-messages'),
    qr:       document.getElementById('sf-quick-replies'),
    input:    document.getElementById('sf-input'),
    inputArea:document.getElementById('sf-input-area'),
  });

  // ── Helpers ──
  function scrollBottom() {
    const m = els().messages;
    setTimeout(() => m.scrollTop = m.scrollHeight, 60);
  }

  function addMsg(text, type = 'bot') {
    const div = document.createElement('div');
    div.className = `sf-msg sf-${type}`;
    div.innerHTML = text;
    els().messages.appendChild(div);
    scrollBottom();
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'sf-msg sf-bot sf-typing';
    div.id = 'sf-typing';
    div.innerHTML = '<span></span><span></span><span></span>';
    els().messages.appendChild(div);
    scrollBottom();
  }

  function hideTyping() {
    const t = document.getElementById('sf-typing');
    if (t) t.remove();
  }

  function botSay(text, delay = 600) {
    return new Promise(resolve => {
      showTyping();
      setTimeout(() => { hideTyping(); addMsg(text); resolve(); }, delay);
    });
  }

  function setQR(buttons) {
    const qr = els().qr;
    qr.innerHTML = '';
    buttons.forEach(b => {
      const btn = document.createElement('button');
      btn.className = `sf-qr${b.primary ? ' sf-qr-primary' : ''}`;
      btn.textContent = b.label;
      btn.onclick = () => {
        addMsg(b.label, 'user');
        qr.innerHTML = '';
        b.action();
      };
      qr.appendChild(btn);
    });
  }

  function clearQR() { els().qr.innerHTML = ''; }

  function showInput(placeholder) {
    els().inputArea.style.display = 'flex';
    els().input.placeholder = placeholder;
    els().input.focus();
  }

  function hideInput() {
    els().inputArea.style.display = 'none';
  }

  // ── Flow ──

  async function startFlow() {
    state.step = 'greeting';
    hideInput();
    await botSay("Hi there! 👋 I'm here to help you book a session with Stael.", 800);
    await botSay("Which service are you looking for?", 500);
    stepService();
  }

  function stepService() {
    state.step = 'service';
    hideInput();
    clearQR();
    const qr = els().qr;
    services.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'sf-qr';
      btn.textContent = s.label;
      btn.onclick = () => {
        state.lead.service = s.short;
        addMsg(s.label, 'user');
        clearQR();
        stepName();
      };
      qr.appendChild(btn);
    });
    // "Not sure" option
    const btn = document.createElement('button');
    btn.className = 'sf-qr';
    btn.textContent = '🤔 Not sure yet';
    btn.onclick = () => {
      state.lead.service = null;
      addMsg('Not sure yet', 'user');
      clearQR();
      stepName();
    };
    qr.appendChild(btn);
  }

  async function stepName() {
    state.step = 'name';
    await botSay("Perfect! What's your name?", 500);
    showInput('Your name...');
  }

  async function stepEmail() {
    state.step = 'email';
    await botSay(`Nice to meet you, ${state.lead.name}! 😊 What's your email so Stael can confirm your booking?`, 600);
    showInput('your@email.com');
  }

  async function stepRedirect() {
    state.step = 'done';
    hideInput();
    clearQR();

    // Save lead to Netlify Forms
    try {
      const fd = new FormData();
      fd.append('form-name', 'chatbot-lead');
      fd.append('name',    state.lead.name  || '');
      fd.append('email',   state.lead.email || '');
      fd.append('service', state.lead.service || 'Not specified');
      await fetch('/', { method: 'POST', body: fd });
    } catch(e) { console.log('lead capture error', e); }

    // Build booking URL with pre-filled params
    const params = new URLSearchParams();
    if (state.lead.service) params.set('service', state.lead.service);
    if (state.lead.name)    params.set('name',    state.lead.name);
    if (state.lead.email)   params.set('email',   state.lead.email);
    const bookingUrl = `/contact?${params.toString()}`;

    await botSay(`Thanks, ${state.lead.name}! 🎉 I've got everything I need.`, 700);
    await botSay(`I'm taking you to the booking page now — pick your date & time and pay securely. Stael will send you a Google Calendar invite the moment it's confirmed. 📅`, 800);

    // Show redirect button + auto-redirect after 2.5s
    const qr = els().qr;
    const btn = document.createElement('button');
    btn.className = 'sf-qr sf-qr-primary';
    btn.textContent = '📅 Go to booking →';
    btn.onclick = () => window.location.href = bookingUrl;
    qr.appendChild(btn);

    setTimeout(() => { window.location.href = bookingUrl; }, 2500);
  }

  // ── Free Chat fallback ──
  async function handleAIQuestion(text) {
    showTyping();
    const system = `You are Stael Gissoni's friendly booking assistant. Stael is a professional English-Portuguese interpreter based in Orlando, FL. Services: Live Interpretation ($65/hr), Virtual Sessions ($55/hr), Medical Interpretation ($75/hr), Legal Interpretation ($85/hr), Language Coaching ($50/session). Keep answers to 2 sentences max. Always guide toward booking. For anything complex, direct to hello@staelfogarty.com.`;
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 150,
          system,
          messages: [{ role: 'user', content: text }]
        })
      });
      const data = await res.json();
      hideTyping();
      addMsg(data.content?.[0]?.text || "Let me connect you with Stael directly — email her at <strong>hello@staelfogarty.com</strong>");
    } catch(e) {
      hideTyping();
      addMsg("Reach Stael directly at <strong>hello@staelfogarty.com</strong> — she typically replies within a few hours!");
    }
    setQR([
      { label: '📅 Book a Session', primary: true, action: () => stepService() },
      { label: '💬 Another Question', action: () => { clearQR(); showInput('Ask anything...'); state.step = 'free-chat'; } },
    ]);
  }

  // ── Input Handler ──
  function sendUser() {
    const input = els().input;
    const text = input.value.trim();
    if (!text) return;
    addMsg(text, 'user');
    input.value = '';
    clearQR();

    switch(state.step) {
      case 'name':
        state.lead.name = text;
        stepEmail();
        break;
      case 'email':
        if (!text.includes('@')) {
          botSay("Hmm, that doesn't look right. Could you check your email?", 400);
          return;
        }
        state.lead.email = text;
        stepRedirect();
        break;
      case 'free-chat':
        handleAIQuestion(text);
        break;
      default:
        handleAIQuestion(text);
    }
  }

  // ── Toggle ──
  function toggle() {
    state.open = !state.open;
    const w = els().window;
    const b = els().bubble;
    if (state.open) {
      w.classList.remove('sf-hidden');
      b.style.display = 'none';
      if (state.step === 'init') startFlow();
    } else {
      w.classList.add('sf-hidden');
      b.style.display = 'flex';
    }
  }

  return { toggle, sendUser };
})();
</script>
