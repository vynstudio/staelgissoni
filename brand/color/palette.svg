<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <rect width="1200" height="900" fill="#FEFBF6"/>
  <text x="60" y="80" font-family="Fraunces, serif" font-weight="800" font-size="56" fill="#2A2A3A">Brand palette</text>
  <text x="60" y="115" font-family="Nunito, sans-serif" font-weight="600" font-size="20" fill="#7C7C96">stael. · English↔Portuguese interpretation &amp; language services</text>

  <!-- Primary — peach -->
  <rect x="60" y="170" width="260" height="200" rx="18" fill="#F2A07B"/>
  <text x="76" y="198" font-family="Nunito" font-weight="800" font-size="14" fill="#FFFFFF" letter-spacing="2">PRIMARY</text>
  <text x="76" y="332" font-family="Fraunces" font-weight="800" font-size="30" fill="#FFFFFF">Peach</text>
  <text x="76" y="358" font-family="Nunito" font-weight="700" font-size="15" fill="#FFFFFF">#F2A07B</text>

  <rect x="60" y="390" width="80" height="80" rx="12" fill="#E08A60"/>
  <text x="150" y="420" font-family="Fraunces" font-weight="700" font-size="18" fill="#2A2A3A">Peach deep</text>
  <text x="150" y="445" font-family="Nunito" font-weight="700" font-size="14" fill="#7C7C96">#E08A60</text>

  <rect x="220" y="390" width="80" height="80" rx="12" fill="#FADBC8"/>
  <text x="60" y="505" font-family="Fraunces" font-weight="700" font-size="18" fill="#2A2A3A">Peach light  ·  #FADBC8</text>
  <text x="60" y="530" font-family="Fraunces" font-weight="700" font-size="18" fill="#2A2A3A">Peach wash  ·  <tspan fill="#E08A60">#FFF2EB</tspan></text>

  <!-- Secondary — blue -->
  <rect x="360" y="170" width="260" height="200" rx="18" fill="#5B8EC9"/>
  <text x="376" y="198" font-family="Nunito" font-weight="800" font-size="14" fill="#FFFFFF" letter-spacing="2">SECONDARY</text>
  <text x="376" y="332" font-family="Fraunces" font-weight="800" font-size="30" fill="#FFFFFF">Blue</text>
  <text x="376" y="358" font-family="Nunito" font-weight="700" font-size="15" fill="#FFFFFF">#5B8EC9</text>

  <rect x="360" y="390" width="80" height="80" rx="12" fill="#4A78B0"/>
  <text x="450" y="420" font-family="Fraunces" font-weight="700" font-size="18" fill="#2A2A3A">Blue deep</text>
  <text x="450" y="445" font-family="Nunito" font-weight="700" font-size="14" fill="#7C7C96">#4A78B0</text>

  <text x="360" y="505" font-family="Fraunces" font-weight="700" font-size="18" fill="#2A2A3A">Blue light  ·  #A3C4E9</text>
  <text x="360" y="530" font-family="Fraunces" font-weight="700" font-size="18" fill="#2A2A3A">Blue wash  ·  <tspan fill="#4A78B0">#EBF2FA</tspan></text>

  <!-- Accents -->
  <rect x="660" y="170" width="180" height="200" rx="18" fill="#8FC5B5"/>
  <text x="676" y="198" font-family="Nunito" font-weight="800" font-size="12" fill="#FFFFFF" letter-spacing="2">ACCENT</text>
  <text x="676" y="332" font-family="Fraunces" font-weight="800" font-size="26" fill="#FFFFFF">Mint</text>
  <text x="676" y="358" font-family="Nunito" font-weight="700" font-size="14" fill="#FFFFFF">#8FC5B5</text>

  <rect x="860" y="170" width="180" height="200" rx="18" fill="#B8A9D4"/>
  <text x="876" y="198" font-family="Nunito" font-weight="800" font-size="12" fill="#FFFFFF" letter-spacing="2">ACCENT</text>
  <text x="876" y="332" font-family="Fraunces" font-weight="800" font-size="26" fill="#FFFFFF">Lavender</text>
  <text x="876" y="358" font-family="Nunito" font-weight="700" font-size="14" fill="#FFFFFF">#B8A9D4</text>

  <!-- Neutrals -->
  <text x="60" y="600" font-family="Fraunces" font-weight="800" font-size="32" fill="#2A2A3A">Neutrals</text>
  <rect x="60" y="630" width="160" height="160" rx="14" fill="#2A2A3A"/>
  <text x="60" y="818" font-family="Nunito" font-weight="700" font-size="14" fill="#2A2A3A">Dark #2A2A3A</text>
  <rect x="240" y="630" width="160" height="160" rx="14" fill="#3D3D50"/>
  <text x="240" y="818" font-family="Nunito" font-weight="700" font-size="14" fill="#2A2A3A">Text #3D3D50</text>
  <rect x="420" y="630" width="160" height="160" rx="14" fill="#7C7C96"/>
  <text x="420" y="818" font-family="Nunito" font-weight="700" font-size="14" fill="#2A2A3A">Muted #7C7C96</text>
  <rect x="600" y="630" width="160" height="160" rx="14" fill="#EDECF0"/>
  <text x="600" y="818" font-family="Nunito" font-weight="700" font-size="14" fill="#2A2A3A">Border #EDECF0</text>
  <rect x="780" y="630" width="160" height="160" rx="14" fill="#FEFBF6" stroke="#EDECF0"/>
  <text x="780" y="818" font-family="Nunito" font-weight="700" font-size="14" fill="#2A2A3A">Bg #FEFBF6</text>
  <rect x="960" y="630" width="160" height="160" rx="14" fill="#FFFFFF" stroke="#EDECF0"/>
  <text x="960" y="818" font-family="Nunito" font-weight="700" font-size="14" fill="#2A2A3A">White #FFFFFF</text>
</svg>
