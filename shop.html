<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://staelgissoni.com/shop" rel="canonical">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Shop — Stael Gissoni</title>
<meta content="Digital study guides, citizenship prep, and ESL workbooks by Stael Gissoni. Instant download after purchase." name="description">
<meta content="website" property="og:type">
<meta content="https://staelgissoni.com/shop" property="og:url">
<meta content="Shop — Stael Gissoni" property="og:title">
<meta content="Digital study guides + ESL workbooks from a Brazilian interpreter based in Orlando." property="og:description">
<link href="https://fonts.googleapis.com" rel="preconnect">
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;0,9..144,800;1,9..144,400;1,9..144,600&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/global.css">
<style>
.nav{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:18px 24px;background:rgba(255,248,243,0.92);backdrop-filter:blur(10px);border-bottom:1px solid rgba(0,0,0,0.04)}
.nav .logo{font-family:'Fraunces',serif;font-weight:800;font-size:1.35rem;color:var(--text);text-decoration:none}
.nav .logo span{color:var(--peach)}
.nav-right{display:flex;gap:12px;align-items:center}
.nav-link{font-size:.88rem;font-weight:600;color:var(--muted);padding:8px 16px;border-radius:var(--r-pill);transition:all .2s}
.nav-link:hover{color:var(--text);background:var(--peach-wash)}
.nav-link.active{color:var(--peach-deep);background:var(--peach-wash)}
.nav-cta{background:var(--peach);color:#fff !important}
.nav-cta:hover{background:var(--peach-deep)}

.shop-hero{padding:88px 24px 48px;text-align:center;background:linear-gradient(180deg,var(--peach-wash) 0%,transparent 100%)}
.shop-hero h1{font-family:'Fraunces',serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:800;margin:0 0 14px}
.shop-hero h1 em{color:var(--peach-deep);font-style:italic}
.shop-hero p{max-width:540px;margin:0 auto;color:var(--muted);font-size:1.05rem;line-height:1.6}
.shop-grid{max-width:1100px;margin:0 auto;padding:24px 24px 96px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:22px}
.p-card{background:#fff;border:1px solid var(--peach-wash);border-radius:var(--r-md);overflow:hidden;display:flex;flex-direction:column;transition:transform .2s,box-shadow .2s}
.p-card:hover{transform:translateY(-4px);box-shadow:0 10px 24px rgba(242,160,123,0.15)}
.p-cover{aspect-ratio:1.2/1;background:linear-gradient(135deg,var(--peach-light),var(--peach));display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Fraunces',serif;font-weight:800;font-size:1.5rem;padding:18px;text-align:center}
.p-cover img{width:100%;height:100%;object-fit:cover;display:block}
.p-body{padding:20px;display:flex;flex-direction:column;gap:8px;flex:1}
.p-lang{font-size:.7rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.p-title{font-family:'Fraunces',serif;font-size:1.2rem;font-weight:700;color:var(--text);margin:0}
.p-sub{font-size:.9rem;color:var(--muted);line-height:1.5;margin:0}
.p-row{margin-top:auto;display:flex;align-items:center;justify-content:space-between;gap:8px;padding-top:12px}
.p-price{font-family:'Fraunces',serif;font-size:1.35rem;font-weight:800;color:var(--peach-deep)}
.p-cta{padding:10px 18px;border-radius:var(--r-sm);background:var(--peach);color:#fff;font-size:.85rem;font-weight:700;text-decoration:none;transition:background .2s}
.p-cta:hover{background:var(--peach-deep)}

.empty,.err{max-width:520px;margin:40px auto;padding:26px;background:#fff;border:1px dashed var(--peach-light);border-radius:var(--r-md);text-align:center;color:var(--muted)}
.err{border-color:#F8B4B4;color:#9B2C2C}
.loading{max-width:1100px;margin:0 auto;padding:24px;text-align:center;color:var(--muted)}
</style>
</head>
<body>
<header><nav class="nav">
  <a href="/" class="logo">stael<span>.</span></a>
  <div class="nav-right">
    <a href="/lessons" class="nav-link">English Lessons</a>
    <a href="/interpretation" class="nav-link">Interpretation</a>
    <a href="/shop" class="nav-link active">Shop</a>
    <a href="/contact" class="nav-link nav-cta">Book →</a>
  </div>
</nav></header>

<main>
<section class="shop-hero">
  <h1>Tools to help you <em>speak with confidence.</em></h1>
  <p>Study guides, workbooks, and audio packs made by Stael — a bilingual interpreter from Brazil. Instant download after purchase.</p>
</section>

<section class="shop-grid" id="grid">
  <div class="loading" id="loading">Loading products…</div>
</section>
</main>

<script>
(async () => {
  const grid = document.getElementById('grid');
  const loading = document.getElementById('loading');
  try {
    const r = await fetch('/.netlify/functions/shop-list');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const { products } = await r.json();
    loading.remove();
    if (!products.length) {
      grid.innerHTML = '<div class="empty">New products coming soon. Check back in a few days.</div>';
      return;
    }
    const fmt$ = (c) => '$' + (c / 100).toFixed((c % 100) ? 2 : 0);
    grid.innerHTML = products.map(p => `
      <article class="p-card">
        <a href="/shop/${p.slug}" style="text-decoration:none">
          <div class="p-cover">
            ${p.cover_image_url ? `<img src="${p.cover_image_url}" alt="${p.title}">` : p.title}
          </div>
        </a>
        <div class="p-body">
          <div class="p-lang">${p.language === 'pt' ? 'Português' : p.language === 'bilingual' ? 'EN · PT' : 'English'}</div>
          <a href="/shop/${p.slug}" style="text-decoration:none;color:inherit"><h2 class="p-title">${p.title}</h2></a>
          ${p.subtitle ? `<p class="p-sub">${p.subtitle}</p>` : ''}
          <div class="p-row">
            <div class="p-price">${fmt$(p.price_cents)}</div>
            <a href="/shop/${p.slug}" class="p-cta">View →</a>
          </div>
        </div>
      </article>
    `).join('');
  } catch (e) {
    loading.remove();
    grid.innerHTML = '<div class="err">Could not load products. Refresh in a moment or <a href="/contact">contact Stael</a>.</div>';
  }
})();
</script>
</body>
</html>
